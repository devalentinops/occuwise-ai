# Training hyperparameters (shared across models/datasets; override per-experiment).
batch_size: 16
num_workers: 4
max_epochs: 50
patience: 8              # early-stopping patience on the val primary metric
lr: 3e-4
weight_decay: 1e-4
loss: ce                 # "ce" | "focal" (classification only)
balance_classes: true    # weighted sampler for imbalanced classification
gradient_clip_val: 1.0
resume: null             # checkpoint path to resume from (e.g. outputs/aptos/resnet50/last.ckpt)

# Session/wall-clock safety (Kaggle etc.). A single Kaggle session is capped at 12h
# REGARDLESS of remaining weekly quota — set max_time below that so training stops
# cleanly (saving last.ckpt) instead of being killed mid-epoch. Then resume next session.
max_time: null                 # e.g. "00:11:00:00"  (DD:HH:MM:SS); null = no limit
check_val_every_n_epoch: 1     # raise to 2+ to validate less often (huge val splits)
limit_val_batches: 1.0         # <1.0 validates on a fraction — big speed-up on 90k-image sets

# Discriminative fine-tuning (classification). Defaults reproduce prior behaviour:
# whole network trains at `lr`. Lower backbone_lr_scale (e.g. 0.1) or freeze the
# backbone when adapting a big pretrained model (RETFound/ViT) to a small dataset.
backbone_lr_scale: 1.0   # backbone LR = lr * this; <1 = gentler feature adaptation
freeze_backbone: false   # true = linear-probe (backbone frozen, only the head trains)

# Hardware
accelerator: auto        # "gpu" | "cpu" | "auto"
devices: auto            # int, list, or "auto"
precision: 16-mixed      # "16-mixed" | "bf16-mixed" | "32-true"
